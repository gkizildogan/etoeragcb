global:
  resolve_timeout: 5m
  smtp_from: alerts@example.com
  smtp_smarthost: smtp.gmail.com:587
  smtp_auth_username: alerts@example.com
  smtp_auth_password_file: /run/secrets/smtp_password
  smtp_require_tls: true

route:
  receiver: personal-email
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: personal-email
    email_configs:
      - to: alerts@example.com
        send_resolved: true
        headers:
          Subject: ETOERAGCB WARNING
        text: |-
          ETOERAGCB monitoring notification
          Status: {{ .Status | toUpper }}

          {{ range .Alerts -}}
          Alert: {{ .Labels.alertname }}
          Severity: {{ .Labels.severity }}
          Error: {{ .Annotations.summary }}
          {{ with .Annotations.description }}Details: {{ . }}{{ end }}
          Started: {{ .StartsAt }}
          {{ if eq .Status "resolved" }}Resolved: {{ .EndsAt }}{{ end }}

          {{ end -}}
