use_default_settings: true

general:
  debug: false
  instance_name: "RAG internal search"

search:
  safe_search: 1
  formats:
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  pool_connections: 20
  pool_maxsize: 20
