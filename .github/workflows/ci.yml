name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        component: [backend, streamlit_app]
    defaults:
      run:
        working-directory: ${{ matrix.component }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install Python 3.13.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.13.14
          cache: pip
          cache-dependency-path: ${{ matrix.component }}/requirements-dev.lock
      - name: Install fully locked dependencies
        run: python -m pip install --require-hashes -r requirements-dev.lock
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Type check backend
        if: matrix.component == 'backend'
        run: mypy app
      - name: Test
        run: pytest
      - name: Verify committed retrieval calibration
        if: matrix.component == 'backend'
        run: python -m app.evaluation.cli verify

  deployment:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate Compose and public port boundary
        run: python3 scripts/verify_compose_boundary.py
      - name: Validate Caddy configuration
        run: >-
          docker run --rm
          -e PUBLIC_DOMAIN=rag.example.com
          -e ACME_EMAIL=admin@example.com
          -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          docker.io/library/caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Validate LAN Caddy configuration
        run: >-
          docker run --rm
          -e PUBLIC_DOMAIN=goksu-ubuntu.local
          -v "$PWD/deploy/Caddyfile.lan:/etc/caddy/Caddyfile:ro"
          docker.io/library/caddy:2.11.4-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Validate Prometheus alert rules
        run: >-
          docker run --rm
          --entrypoint /bin/promtool
          -v "$PWD/deploy/monitoring:/etc/prometheus:ro"
          docker.io/prom/prometheus:v3.11.3-distroless@sha256:cff72a3f49918f41c4b5c8a6174dd8433036bebf7878120da538b3720ba3fa0d
          check rules /etc/prometheus/alerts.yml
      - name: Validate Alertmanager email configuration
        run: >-
          docker run --rm
          --entrypoint /bin/amtool
          -v "$PWD/deploy/monitoring/alertmanager.example.yml:/etc/alertmanager/alertmanager.yml:ro"
          docker.io/prom/alertmanager:v0.32.1@sha256:51a825c2a40acc3e338fdd00d622e01ec090f72be2b3ea46be0839cd47a4d286
          check-config /etc/alertmanager/alertmanager.yml
      - name: Compile utility scripts
        run: python3 -m compileall -q scripts

  dependency-audit:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        component: [backend, streamlit_app]
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install Python 3.13.14
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: 3.13.14
      - name: Audit locked Python dependencies
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266
        with:
          inputs: ${{ matrix.component }}/requirements.lock
          require-hashes: true

  image-audit:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build application images
        run: >-
          docker compose
          --env-file deploy/.env.example
          -f deploy/compose.yml
          build backend streamlit
      - name: Scan backend image
        run: >-
          docker run --rm
          -e GRYPE_DB_CACHE_DIR=/grype-cache
          -v /var/run/docker.sock:/var/run/docker.sock:ro
          -v grype-cache:/grype-cache
          -v "$PWD/deploy/security/grype.yaml:/grype.yaml:ro"
          docker.io/anchore/grype:v0.112.0@sha256:391bfda62888fb4e98ff5c4c81598f7431a3c1eac3f8519d69d1ff00df247c1d
          rag-chatbot-backend:0.1.0 --config /grype.yaml --only-fixed --fail-on high
      - name: Scan Streamlit image
        run: >-
          docker run --rm
          -e GRYPE_DB_CACHE_DIR=/grype-cache
          -v /var/run/docker.sock:/var/run/docker.sock:ro
          -v grype-cache:/grype-cache
          -v "$PWD/deploy/security/grype.yaml:/grype.yaml:ro"
          docker.io/anchore/grype:v0.112.0@sha256:391bfda62888fb4e98ff5c4c81598f7431a3c1eac3f8519d69d1ff00df247c1d
          rag-chatbot-streamlit:0.1.0 --config /grype.yaml --only-fixed --fail-on high
